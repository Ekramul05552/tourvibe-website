<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TourVibe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">TourVibe</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">হোম</a></li>
          <li class="nav-item"><a class="nav-link" href="packages.html">প্যাকেজসমূহ</a></li>
          <li class="nav-item"><a class="nav-link" href="#booking">বুকিং</a></li>
          <li class="nav-item"><a class="nav-link" href="#contact">যোগাযোগ</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <header class="bg-success text-white text-center py-5">
    <div class="container">
      <h1 class="display-4">TourVibe এ স্বাগতম 🌏</h1>
      <p class="lead">বাংলাদেশের সেরা ট্যুর প্যাকেজ আপনার জন্য!</p>
      <a href="packages.html" class="btn btn-light btn-lg mt-3">প্যাকেজ দেখুন</a>
    </div>
  </header>

  <!-- Booking Section -->
  <section id="booking" class="py-5">
    <div class="container">
      <h2 class="text-center mb-4">📌 এখনই বুকিং করুন</h2>
      <form id="bookingForm" class="p-4 border rounded bg-light">
        
        <div class="mb-3">
          <label for="packageName" class="form-label">প্যাকেজের নাম</label>
          <input type="text" id="packageName" name="packageName" class="form-control" readonly>
        </div>

        <div class="mb-3">
          <label for="fullName" class="form-label">পূর্ণ নাম</label>
          <input type="text" id="fullName" name="fullName" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="phone" class="form-label">ফোন নাম্বার</label>
          <input type="tel" id="phone" name="phone" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="persons" class="form-label">কতজন ভ্রমণ করবেন</label>
          <input type="number" id="persons" name="persons" class="form-control" min="1" required>
        </div>

        <button type="submit" class="btn btn-success w-100">✅ বুকিং কনফার্ম করুন</button>
      </form>
    </div>
  </section>

  <!-- Contact Section -->
  <section id="contact" class="py-5 bg-dark text-white text-center">
    <div class="container">
      <h2>📞 যোগাযোগ করুন</h2>
      <p>ইকরামুল ইসলাম (TourVibe)</p>
      <p>📲 +8801990-723902 (WhatsApp)</p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="text-white text-center py-3 bg-success">
    <p class="mb-0">© 2025 TourVibe – All Rights Reserved</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Auto-fill selected package
    document.addEventListener("DOMContentLoaded", function() {
      const pkg = localStorage.getItem("selectedPackage");
      if (pkg) {
        const pkgField = document.getElementById("packageName");
        if (pkgField) {
          pkgField.value = pkg;
        }
        localStorage.removeItem("selectedPackage");
      }
    });

    // (Optional) Booking form submission handler
    document.getElementById("bookingForm").addEventListener("submit", function(e) {
      e.preventDefault();
      alert("🎉 আপনার বুকিং অনুরোধ গ্রহণ করা হয়েছে! TourVibe টিম শীঘ্রই যোগাযোগ করবে।");
      this.reset();
    });
  </script>

  <!-- Dark Mode Toggle -->
<div style="position: fixed; bottom: 20px; right: 20px; z-index: 1000;">
  <button id="themeToggle" class="btn btn-light rounded-circle shadow">
    🌙
  </button>
</div>

<script>
  const toggleBtn = document.getElementById("themeToggle");
  const body = document.body;

  // Load saved theme
  if (localStorage.getItem("theme") === "dark") {
    body.classList.add("dark-mode");
    toggleBtn.textContent = "☀️";
  } else {
    body.classList.add("light-mode");
  }

  // Toggle theme
  toggleBtn.addEventListener("click", () => {
    body.classList.toggle("dark-mode");
    body.classList.toggle("light-mode");

    if (body.classList.contains("dark-mode")) {
      toggleBtn.textContent = "☀️";
      localStorage.setItem("theme", "dark");
    } else {
      toggleBtn.textContent = "🌙";
      localStorage.setItem("theme", "light");
    }
  });
</script>


</body>
</html>
