<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TourVibe</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- SweetAlert2 (load before we call Swal) -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">TourVibe</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">হোম</a></li>
          <li class="nav-item"><a class="nav-link" href="packages.html">প্যাকেজসমূহ</a></li>
          <li class="nav-item"><a class="nav-link" href="#booking">বুকিং</a></li>
          <li class="nav-item"><a class="nav-link" href="#contact">যোগাযোগ</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header class="bg-success text-white text-center py-5">
    <div class="container">
      <h1 class="display-4">TourVibe এ স্বাগতম 🌏</h1>
      <p class="lead">বাংলাদেশের সেরা ট্যুর প্যাকেজ আপনার জন্য!</p>
      <a href="packages.html" class="btn btn-light btn-lg mt-3">প্যাকেজ দেখুন</a>
    </div>
  </header>

  <!-- Booking -->
  <section id="booking" class="py-5">
    <div class="container">
      <h2 class="text-center mb-4">📌 এখনই বুকিং করুন</h2>

      <form id="bookingForm" class="p-4 border rounded bg-light" autocomplete="off">
        <div class="mb-3">
          <label for="packageName" class="form-label">প্যাকেজের নাম</label>
          <input type="text" id="packageName" name="package" class="form-control" readonly>
        </div>

        <div class="mb-3">
          <label for="fullName" class="form-label">পূর্ণ নাম</label>
          <input type="text" id="fullName" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="phone" class="form-label">ফোন নাম্বার</label>
          <input type="tel" id="phone" name="phone" class="form-control" placeholder="01XXXXXXXXX" required pattern="[0-9]{11}">
        </div>

        <div class="mb-3">
          <label for="persons" class="form-label">কতজন ভ্রমণ করবেন</label>
          <input type="number" id="persons" name="persons" class="form-control" min="1" required>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-success w-100">
          ✅ বুকিং কনফার্ম করুন
        </button>
      </form>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact" class="py-5 bg-dark text-white text-center">
    <div class="container">
      <h2>📞 যোগাযোগ করুন</h2>
      <p>ইকরামুল ইসলাম (TourVibe)</p>
      <p>📲 +8801990-723902 (WhatsApp)</p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="text-white text-center py-3 bg-success">
    <p class="mb-0">© 2025 TourVibe – All Rights Reserved</p>
  </footer>

  <!-- Dark Mode Toggle -->
  <div style="position: fixed; bottom: 20px; right: 20px; z-index: 1000;">
    <button id="themeToggle" class="btn btn-light rounded-circle shadow">🌙</button>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Main JS: Submit handler, autofill, dark-mode, spinner + SweetAlert2 -->
  <script>
  (function(){
    // CONFIG: replace with your deployed Apps Script Web App URL
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbycZc5Et6zJ2ITDQIL1NNXbZ0B160xXfP1LMTCVSW9abOI4knhvgSWfP6FUfInf1ybQ-g/exec";

    // Elements
    const form = document.getElementById("bookingForm");
    const submitBtn = document.getElementById("submitBtn");
    const pkgField = document.getElementById("packageName");

    // 1) Auto-fill package from localStorage (if user came from packages.html)
    document.addEventListener("DOMContentLoaded", () => {
      try {
        const saved = localStorage.getItem("selectedPackage");
        if (saved) {
          pkgField.value = saved;
          localStorage.removeItem("selectedPackage");
        }
      } catch (err) {
        console.warn("localStorage error:", err);
      }
    });

    // Helper to set button to loading state
    function setLoading() {
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>প্রসেস হচ্ছে...';
    }
    function setIdle() {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '✅ বুকিং কনফার্ম করুন';
    }

    // 2) Form submit handler (async/await for clarity)
    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      // Basic client-side validation for phone (ensure 11 digits starting with 0)
      const phone = (document.getElementById("phone").value || "").trim();
      if (!/^[0][0-9]{10}$/.test(phone)) {
        Swal.fire({
          icon: "warning",
          title: "ভুল ফোন নাম্বার",
          text: "ফোন নাম্বার সঠিক নয় — উদাহরণ: 01XXXXXXXXX",
          confirmButtonColor: "#f77e01"
        });
        return;
      }

      // Prepare form data
      const formData = new FormData(form);

      try {
        setLoading();

        const resp = await fetch(WEB_APP_URL, {
          method: "POST",
          body: formData,
          mode: "cors",
          credentials: "omit"
        });

        const text = await resp.text();

        if (!resp.ok) {
          // If Apps Script returned error message, show it
          throw new Error(text || `Server returned ${resp.status}`);
        }

        // Success popup then redirect
        await Swal.fire({
          icon: "success",
          title: "✅ বুকিং সফল হয়েছে!",
          text: "আমাদের টিম শিগগিরই আপনার সাথে যোগাযোগ করবে।",
          confirmButtonText: "ঠিক আছে",
          confirmButtonColor: "#28a745"
        });

        // redirect
        window.location.href = "thankyou.html";

      } catch (err) {
        // Show friendly error
        console.error("Booking error:", err);
        await Swal.fire({
          icon: "error",
          title: "দুঃখিত — সমস্যা হয়েছে",
          text: (err && err.message) ? err.message : "সার্ভারে সংযোগ করা যায়নি। আবার চেষ্টা করুন।",
          confirmButtonText: "আবার চেষ্টা করুন",
          confirmButtonColor: "#dc3545"
        });

        setIdle();
      }
    });

    // 3) Dark mode toggle (persistent)
    const toggleBtn = document.getElementById("themeToggle");
    const body = document.body;
    if (localStorage.getItem("theme") === "dark") {
      body.classList.add("dark-mode");
      toggleBtn.textContent = "☀️";
    } else {
      body.classList.add("light-mode");
    }
    toggleBtn.addEventListener("click", () => {
      body.classList.toggle("dark-mode");
      body.classList.toggle("light-mode");
      if (body.classList.contains("dark-mode")) {
        toggleBtn.textContent = "☀️";
        localStorage.setItem("theme", "dark");
      } else {
        toggleBtn.textContent = "🌙";
        localStorage.setItem("theme", "light");
      }
    });

  })();
  </script>
</body>
</html>
