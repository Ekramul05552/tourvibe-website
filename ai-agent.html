<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TourVibe AI Agent</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
    #chatbox { max-width: 600px; margin: auto; border: 1px solid #ddd; border-radius: 12px; padding: 15px; }
    .msg { margin: 8px 0; }
    .user { text-align: right; color: blue; }
    .bot { text-align: left; color: green; }
  </style>
</head>
<body>
  <div id="chatbox">
    <div id="messages"></div>
    <input id="userInput" placeholder="Ask about TourVibe packages..." style="width:80%;">
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById("userInput");
      const msg = input.value.trim();
      if (!msg) return;

      // Show user msg
      const messages = document.getElementById("messages");
      messages.innerHTML += `<div class="msg user">${msg}</div>`;
      input.value = "";

      // Call OpenAI API
      const response = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer YOUR_OPENAI_API_KEY"
        },
        body: JSON.stringify({
          model: "gpt-4o-mini",
          messages: [{ role: "system", content: "You are TourVibe AI Agent, a travel assistant for a Bangladeshi travel agency. Help customers with tour packages, bookings, and offers." },
                     { role: "user", content: msg }]
        })
      });

      const data = await response.json();
      const reply = data.choices[0].message.content;
      messages.innerHTML += `<div class="msg bot">${reply}</div>`;
    }
  </script>
</body>
</html>
